<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Light bulb icon for 3D Light -->
  <circle cx="32" cy="32" r="28" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
  <!-- Light rays -->
  <g stroke="#f5d042" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="4" x2="32" y2="12"/>
    <line x1="32" y1="52" x2="32" y2="60"/>
    <line x1="4" y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="60" y2="32"/>
    <line x1="12" y1="12" x2="18" y2="18"/>
    <line x1="46" y1="46" x2="52" y2="52"/>
    <line x1="12" y1="52" x2="18" y2="46"/>
    <line x1="46" y1="18" x2="52" y2="12"/>
  </g>
  <!-- Bulb -->
  <circle cx="32" cy="32" r="14" fill="#fff9e6" stroke="#e94560" stroke-width="1.5"/>
  <!-- Bulb base -->
  <rect x="26" y="44" width="12" height="6" fill="#e94560" rx="1"/>
</svg>
